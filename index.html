<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenno Galaxy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="galaxy"></canvas>

      <section class="hud hud-top">
        <div>
          <p class="eyebrow">WARFRAME ATLAS</p>
          <h1>Tenno Galaxy</h1>
        </div>
        <div class="stats" aria-label="星图统计">
          <span><strong id="warframeCount">0</strong> 战甲恒星</span>
          <span><strong id="skinCount">0</strong> 皮肤行星</span>
          <span><strong id="weaponCount">0</strong> 武器恒星</span>
        </div>
      </section>

      <aside class="panel panel-left" aria-label="星图控制">
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索 Mesa / Jade / Skana" autocomplete="off" />
          <button id="resetView" title="重置视角" aria-label="重置视角">⌖</button>
        </div>

        <div class="segmented" role="tablist" aria-label="星系选择">
          <button class="active" data-galaxy="warframes">战甲星系</button>
          <button data-galaxy="weapons">武器星系</button>
        </div>

        <div class="filters" aria-label="分类筛选">
          <button class="active" data-filter="all">全部</button>
          <button data-filter="prime">Prime</button>
          <button data-filter="deluxe">Deluxe</button>
          <button data-filter="heirloom">Heirloom</button>
          <button data-filter="tennogen">TennoGen</button>
          <button data-filter="incarnon">Incarnon</button>
        </div>

        <div class="list" id="objectList"></div>
      </aside>

      <aside class="panel panel-right" aria-live="polite">
        <p class="eyebrow" id="detailType">SELECTED NODE</p>
        <h2 id="detailName">点击一颗恒星</h2>
        <div class="detail-media" id="detailMedia" hidden>
          <img id="detailImage" alt="" loading="eager" referrerpolicy="no-referrer" />
          <div class="detail-media-fallback" id="detailMediaFallback">
            <span id="detailFallbackMark">M</span>
            <small>星图材质预览</small>
          </div>
          <span class="detail-status" id="detailStatus">待核实</span>
        </div>
        <p id="detailCopy">恒星代表战甲或武器，行星代表皮肤、变体和特殊外观。拖动星图，点击节点进入它的轨道。</p>
        <dl class="detail-grid">
          <div>
            <dt>分类</dt>
            <dd id="detailCategory">-</dd>
          </div>
          <div>
            <dt>轨道数量</dt>
            <dd id="detailChildren">-</dd>
          </div>
          <div>
            <dt>视觉权重</dt>
            <dd id="detailWeight">-</dd>
          </div>
        </dl>
        <dl class="detail-facts" id="detailFacts" hidden>
          <div><dt>发布时间</dt><dd id="detailRelease">-</dd></div>
          <div><dt>获取方式</dt><dd id="detailAcquisition">-</dd></div>
        </dl>
        <a class="detail-source" id="detailSource" href="#" target="_blank" rel="noreferrer" hidden>查看公共资料页 ↗</a>
        <div class="detail-tags" id="detailTags"></div>
      </aside>

      <div class="cinema">
        <button id="cinemaMode">电影镜头</button>
      </div>

      <div class="system-exit" id="systemExit">
        <button id="exitSystem" aria-label="返回总星图">← 返回总星图</button>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
